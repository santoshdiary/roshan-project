<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Game</title>
    <link rel="stylesheet" href="bubble_style.css">
    
</head>
<body>
    <div id="main">
        <div id="panel">
            <div id="panelTop">
                <div class="elem">
                    <h2>Hit</h2>
                    <div id="hitValue" class="box">5</div>
                </div>
                <div class="elem">
                    <h2>Timer</h2>
                    <div id="timerValue" class="box">60</div>
                </div>
                <div class="elem">
                    <h2>Score</h2>
                    <div id="scoreValue" class="box">0</div>
                </div>
            </div>
            <div id="panelBottom">
                <div class="game-over">
                    <h2>Bubble Game</h2>
                    <button id="startBtn">Start Game</button>
                </div>
            </div>
        </div>
    </div>
    <script src="bubble_script.js"></script>
</body>
</html>
